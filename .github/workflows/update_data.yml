name: Update Dashboard Data

on:
  schedule:
    - cron: '*/1 * * * *' # Запуск кожні 15 хвилин
  workflow_dispatch: # Дозволяє запустити скрипт вручну кнопкою з інтерфейсу

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Дозвіл боту на запис у репозиторій
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Fetch and convert data
        run: python update_data.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add data.json
          # Робимо коміт лише якщо файл data.json дійсно змінився
          git diff --quiet && git diff --staged --quiet || (git commit -m "Автоматичне оновлення даних" && git push)
          
